<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBT 03 - Cascade Puzzle</title>
    <style>
        body { font-size: 16px; color: #333; font-family: Arial, sans-serif; }
        .container { font-size: 14px; }
        .card { color: blue; border: 1px solid #999; margin: 15px; padding: 15px; }
        .card .title { font-size: 20px; }
        .card p { color: inherit; }
        #featured .title { color: red; }
        .highlight { color: green !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="featured">
            <h2 class="title highlight">Sản phẩm A</h2>
            <p>Mô tả sản phẩm</p>
        </div>
        <div class="card">
            <h2 class="title">Sản phẩm B</h2>
            <p class="highlight">Mô tả sản phẩm B</p>
        </div>
    </div>
</body>
</html>
