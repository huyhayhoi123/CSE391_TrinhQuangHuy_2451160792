<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web ShopTLU</title>
</head>
<body>
    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav>
            <a href="/">Trang chủ</a>
            <a href="/products">Sản phẩm</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Sản phẩm hot</h2>
            <figure>
                <img src="iphone.jpg" alt="iPhone 16 Pro">
                <figcaption>iPhone 16 Pro</figcaption>
            </figure>
            <p>Giá: <strong>25.990.000đ</strong></p>
        </section>

        <section>
            <h2>Thông tin</h2>
            <table border="1">
                <caption>Bảng thông tin sản phẩm</caption>
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <aside>
        <h2>Sidebar</h2>
        <p>Sidebar content</p>
    </aside>

    <footer>
        <p>&copy; 2026 ShopTLU</p>
    </footer>
</body>
</html>
