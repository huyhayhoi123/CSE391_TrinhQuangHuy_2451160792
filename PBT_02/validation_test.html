<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Test</title>
</head>
<body>
    <header>
        <h1>Kiểm tra HTML5 Validation</h1>
    </header>

    <main>
        <form action="#" method="POST">
            <p>
                <label for="case1">Trường hợp 1 - Required text:</label>
                <input type="text" id="case1" name="case1" required value="">
            </p>

            <p>
                <label for="case2">Trường hợp 2 - Email:</label>
                <input type="email" id="case2" name="case2" value="abc">
            </p>

            <p>
                <label for="case3">Trường hợp 3 - Number min max:</label>
                <input type="number" id="case3" name="case3" min="1" max="10" value="15">
            </p>

            <p>
                <label for="case4">Trường hợp 4 - Pattern 10 chữ số:</label>
                <input type="text" id="case4" name="case4" pattern="[0-9]{10}" value="abc123" title="Nhập đúng 10 chữ số">
            </p>

            <p>
                <label for="case5">Trường hợp 5 - Password minlength:</label>
                <input type="password" id="case5" name="case5" minlength="8" value="123">
            </p>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </main>
</body>
</html>
