<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia sản phẩm ShopTLU</title>
</head>
<body>
    <header>
        <h1>Giới thiệu sản phẩm ShopTLU</h1>
        <nav>
            <a href="#anh">Ảnh sản phẩm</a>
            <a href="#video">Video</a>
            <a href="#audio">Audio</a>
        </nav>
    </header>

    <main>
        <section id="anh">
            <h2>Ảnh sản phẩm</h2>

            <figure>
                <img src="https://placehold.co/300x200" alt="Bàn phím cơ TLU K1 màu đen" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Bàn phím cơ TLU K1</figcaption>
            </figure>

            <figure>
                <img src="https://placehold.co/300x200" alt="Chuột không dây TLU M2 màu trắng" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Chuột không dây TLU M2</figcaption>
            </figure>

            <figure>
                <img src="https://placehold.co/300x200" alt="Màn hình TLU Vision 24 inch" loading="lazy" style="max-width: 100%; height: auto;">
                <figcaption>Màn hình TLU Vision 24</figcaption>
            </figure>
        </section>

        <section id="video">
            <h2>Video giới thiệu</h2>

            <h3>Video YouTube</h3>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="Video giới thiệu sản phẩm" allowfullscreen></iframe>

            <h3>Video HTML5</h3>
            <video controls poster="https://placehold.co/600x300">
                <source src="product-demo.mp4" type="video/mp4">
                <source src="product-demo.webm" type="video/webm">
                Trình duyệt của bạn không hỗ trợ thẻ video.
            </video>
        </section>

        <section id="audio">
            <h2>Audio giới thiệu</h2>
            <audio controls>
                <source src="intro.mp3" type="audio/mpeg">
                <source src="intro.ogg" type="audio/ogg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </section>

        <section>
            <h2>Logo SVG inline</h2>
            <svg width="180" height="120" viewBox="0 0 180 120" role="img" aria-label="Logo ShopTLU hình tròn và chữ TLU">
                <circle cx="60" cy="60" r="45" fill="none" stroke="black" stroke-width="4"></circle>
                <rect x="105" y="30" width="50" height="60" fill="none" stroke="black" stroke-width="4"></rect>
                <text x="43" y="67" font-size="20">TLU</text>
            </svg>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ShopTLU</p>
    </footer>
</body>
</html>
