<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBT 05 - Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <header>
        <h1>CSS Transitions & Animations</h1>
    </header>

    <main>
        <section class="cards fade-in">
            <article class="card">
                <section class="image-box">
                    <img src="https://placehold.co/400x260" alt="Bàn phím cơ">
                </section>
                <h2>Bàn phím cơ</h2>
                <p>Sản phẩm có hiệu ứng hover và zoom ảnh.</p>
                <button>Mua ngay</button>
            </article>

            <article class="card">
                <section class="image-box">
                    <img src="https://placehold.co/400x260" alt="Chuột không dây">
                </section>
                <h2>Chuột không dây</h2>
                <p>Nút mua có hiệu ứng đổi màu và scale.</p>
                <button>Mua ngay</button>
            </article>
        </section>

        <section class="loader-section fade-in">
            <h2>Loading spinner</h2>
            <section class="spinner" aria-label="Đang tải"></section>
        </section>
    </main>
</body>
</html>
