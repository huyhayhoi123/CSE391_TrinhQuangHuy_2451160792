<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBT 06 - Product Card Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <main class="container py-5">
        <h1 class="mb-4">Product Card + Modal Bootstrap</h1>

        <div class="row">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card position-relative h-100">
                    <span class="badge bg-danger position-absolute top-0 end-0 m-2">Sale</span>
                    <img src="https://placehold.co/300x200?text=iPhone" class="card-img-top" alt="iPhone 16 Pro Max">
                    <div class="card-body">
                        <h5 class="card-title">iPhone 16 Pro Max</h5>
                        <p class="card-text">Chip mạnh, camera đẹp, pin dùng cả ngày.</p>
                        <p class="text-danger fw-bold">25.990.000đ</p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
                            Xem nhanh
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">iPhone 16 Pro Max</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img src="https://placehold.co/500x300?text=iPhone+Detail" class="img-fluid rounded mb-3" alt="Ảnh chi tiết iPhone">
                    <p>Sản phẩm có thiết kế cao cấp, hiệu năng mạnh và camera chất lượng.</p>
                    <p class="fw-bold text-danger">25.990.000đ</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary">Thêm vào giỏ hàng</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
